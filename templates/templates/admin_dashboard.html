{% extends "base.html" %}

{% block content %}

<div class="container" style="padding: 40px;">

    <h1 style="margin-bottom: 20px;">Panel de Administrador</h1>

    <div class="stats-grid" style="display: flex; gap: 20px; flex-wrap: wrap;">

        <div class="card" style="padding:20px; border-radius:10px; background:#f5f7ff;">
            <h3>Total Usuarios</h3>
            <p style="font-size: 24px;">120</p>
        </div>

        <div class="card" style="padding:20px; border-radius:10px; background:#e8fff5;">
            <h3>Citas Activas</h3>
            <p style="font-size: 24px;">58</p>
        </div>

        <div class="card" style="padding:20px; border-radius:10px; background:#fff4e8;">
            <h3>Médicos Registrados</h3>
            <p style="font-size: 24px;">25</p>
        </div>

    </div>

    <div style="margin-top:40px;">

        <h2>Acciones rápidas</h2>

        <div style="margin-top:20px; display:flex; gap:15px; flex-wrap: wrap;">

            <a href="/appointments" class="btn" style="padding:10px 20px; background:#1677ff; color:white; border-radius:8px; text-decoration:none;">
                Ver citas
            </a>

            <a href="/doctors" class="btn" style="padding:10px 20px; background:#10b76a; color:white; border-radius:8px; text-decoration:none;">
                Gestionar médicos
            </a>

            <a href="/logout" class="btn" style="padding:10px 20px; background:#ff4d4f; color:white; border-radius:8px; text-decoration:none;">
                Cerrar sesión
            </a>

        </div>

    </div>

</div>

{% endblock %}
